<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultra-Realistic Sakura Tree</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: radial-gradient(circle, #1a1c2e 0%, #0b0c16 100%);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: sans-serif;
        }
        #canvas-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            gap: 10px;
        }
        button {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }
        button:hover {
            background: rgba(255, 183, 197, 0.3);
            border-color: #ffb7c5;
        }
    </style>
</head>
<body>

    <div id="canvas-container">
        <!-- Daraxt va statik elementlar uchun canvas -->
        <canvas id="treeCanvas"></canvas>
        <!-- Harakatlanuvchi barglar (petals) uchun canvas -->
        <canvas id="petalCanvas"></canvas>
    </div>

    <div class="controls">
        <button id="regenBtn">Yangi Daraxt O'stirish</button>
    </div>

    <script>
        const treeCanvas = document.getElementById('treeCanvas');
        const treeCtx = treeCanvas.getContext('2d');
        const petalCanvas = document.getElementById('petalCanvas');
        const petalCtx = petalCanvas.getContext('2d');

        let width, height;
        let petals = [];
        const maxPetals = 250; // To'kilayotgan barglar soni

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            
            treeCanvas.width = width;
            treeCanvas.height = height;
            petalCanvas.width = width;
            petalCanvas.height = height;
            
            generateTree();
        }

        // Tasodifiy son olish funksiyasi
        function random(min, max) {
            return Math.random() * (max - min) + min;
        }

        // Shoxlarni chizish (Fraktal rekursiya)
        function drawBranch(x, y, len, angle, branchWidth, depth) {
            if (depth === 0) return;

            treeCtx.beginPath();
            treeCtx.moveTo(x, y);
            
            // Shamol effektini hisobga olgan holda keyingi nuqta
            let nextX = x + Math.cos(angle) * len;
            let nextY = y + Math.sin(angle) * len;

            // Shox rangi chuqurlikka qarab o'zgaradi (boshida to'q jigarrang, oxirida ochroq)
            let trunkGrad = treeCtx.createLinearGradient(x, y, nextX, nextY);
            trunkGrad.addColorStop(0, '#2c1619');
            trunkGrad.addColorStop(1, '#422226');
            
            treeCtx.strokeStyle = trunkGrad;
            treeCtx.lineWidth = branchWidth;
            treeCtx.lineCap = 'round';
            treeCtx.lineTo(nextX, nextY);
            treeCtx.stroke();

            // Agar shox uchi bo'lsa, sakura gullarini chizamiz
            if (depth <= 4) {
                drawFlowers(nextX, nextY, depth);
            }

            // Yangi shoxchalar soni va burchaklari
            let branchesCount = random(2, 4);
            for (let i = 0; i < branchesCount; i++) {
                let newAngle = angle + random(-0.5, 0.5);
                let newLength = len * random(0.7, 0.85);
                drawBranch(nextX, nextY, newLength, newAngle, branchWidth * 0.7, depth - 1);
            }
        }

        // Gullarni (Sakura barglarini) chizish
        function drawFlowers(x, y, depth) {
            let numFlowers = random(5, 12) * (5 - depth);
            for (let i = 0; i < numFlowers; i++) {
                let r = random(2, 6);
                let offsetX = random(-15, 15);
                let offsetY = random(-15, 15);
                
                // Sakura ranglari (och pushtidan to'q pushtigacha gradient)
                let colors = ['#ffb7c5', '#ffa4b6', '#ff8da1', '#ffccd5', '#ffffff'];
                let color = colors[Math.floor(Math.random() * colors.length)];

                treeCtx.beginPath();
                treeCtx.arc(x + offsetX, y + offsetY, r, 0, Math.PI * 2);
                treeCtx.fillStyle = color;
                treeCtx.shadowColor = 'rgba(255, 141, 161, 0.3)';
                treeCtx.shadowBlur = 4;
                treeCtx.fill();
                treeCtx.shadowBlur = 0; // reset
            }
        }

        // Pastdagi maysa va to'kilgan barglar uyumi
        function drawGround() {
            // Maysa tepaligi
            let grad = treeCtx.createRadialGradient(width/2, height, 10, width/2, height, width*0.4);
            grad.addColorStop(0, '#2d4a22');
            grad.addColorStop(1, '#0b0c16');
            
            treeCtx.beginPath();
            treeCtx.ellipse(width / 2, height, width * 0.35, 60, 0, 0, Math.PI, true);
            treeCtx.fillStyle = grad;
            treeCtx.fill();

            // Erda yotgan barglar
            for (let i = 0; i < 400; i++) {
                let gx = random(width/2 - width*0.3, width/2 + width*0.3);
                let gy = random(height - 40, height);
                let r = random(1.5, 3.5);
                
                treeCtx.beginPath();
                treeCtx.ellipse(gx, gy, r * 1.5, r, random(0, Math.PI), 0, Math.PI * 2);
                treeCtx.fillStyle = ['#ffb7c5', '#ffa4b6', '#ff8da1'][Math.floor(Math.random() * 3)];
                treeCtx.fill();
            }
        }

        function generateTree() {
            treeCtx.clearRect(0, 0, width, height);
            drawGround();
            // Boshlang'ich daraxt tanasi (Pastdan yuqoriga -Math.PI/2 yo'nalishda)
            let trunkLength = height * 0.22;
            let trunkWidth = trunkLength * 0.12;
            drawBranch(width / 2, height - 20, trunkLength, -Math.PI / 2, trunkWidth, 11);
        }

        // To'kilayotgan barglar klassi (Particle System)
        class Petal {
            constructor() {
                this.reset();
                this.y = random(0, height); // Ekran bo'ylab tarqalib tushishi uchun boshida random y
            }

            reset() {
                this.x = random(0, width * 0.8);
                this.y = random(-20, 0);
                this.r = random(2, 5);
                this.speedX = random(1, 2.5); // O'ngga shamol effekti
                this.speedY = random(0.8, 2);
                this.angle = random(0, Math.PI * 2);
                this.spin = random(-0.02, 0.02);
                this.color = ['#ffb7c5', '#ffa4b6', '#ff8da1', '#ffccd5'][Math.floor(Math.random() * 4)];
            }

            update() {
                this.x += this.speedX + Math.sin(this.angle) * 0.5;
                this.y += this.speedY;
                this.angle += this.spin;

                // Agar erga tushsa yoki ekrandan chiqib ketsa, tepadan qaytadan tushadi
                if (this.y > height - 20 || this.x > width) {
                    this.reset();
                }
            }

            draw() {
                petalCtx.save();
                petalCtx.translate(this.x, this.y);
                petalCtx.rotate(this.angle);
                petalCtx.beginPath();
                // Realistik barg shakli (ellipse)
                petalCtx.ellipse(0, 0, this.r * 1.4, this.r, 0, 0, Math.PI * 2);
                petalCtx.fillStyle = this.color;
                petalCtx.fill();
                petalCtx.restore();
            }
        }

        // Animatsiya sikli
        function initPetals() {
            petals = [];
            for (let i = 0; i < maxPetals; i++) {
                petals.push(new Petal());
            }
        }

        function animate() {
            petalCtx.clearRect(0, 0, width, height);
            
            for (let i = 0; i < petals.length; i++) {
                petals[i].update();
                petals[i].draw();
            }
            
            requestAnimationFrame(animate);
        }

        // Hodisalar (Events)
        window.addEventListener('resize', resize);
        document.getElementById('regenBtn').addEventListener('click', generateTree);

        // Start
        resize();
        initPetals();
        animate();
    </script>
</body>
</html>
